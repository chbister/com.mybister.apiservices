x-common-env: &common-env
  HF_TOKEN: "${HF_TOKEN:-}"
  CALLBACK_AUTH_SECRET: "${CALLBACK_AUTH_SECRET:-}"
  REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

x-asr-env: &asr-env
  <<: *common-env
  ASR_COMPUTE_TYPE: "int8"
  ASR_DEFAULT_LANGUAGE: "auto"
  ASR_ASYNC_THRESHOLD: "300"
  ASR_JOBS_DIR: "/srv/jobs"
  UVICORN_HOST: "0.0.0.0"
  UVICORN_PORT: "8000"
  UVICORN_WORKERS: "2"
  OMP_NUM_THREADS: "1"
  CT2_NUM_THREADS: "1"

x-asr-base: &asr-base
  image: ghcr.io/chbister/asr:latest
  environment:
    <<: *asr-env
  volumes:
    - hf_cache:/root/.cache/huggingface
    - ct2_cache:/root/.cache/ctranslate2
    - asr_jobs:/srv/jobs

services:
  # --- PRODUCTION SERVICES (Profile: prod) ---
  asr-image-builder:
    build:
      context: ./asr-service
    image: ghcr.io/chbister/asr:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service asr-image-builder is only for building the image"]
    restart: "no"

  asr-tiny:
    <<: *asr-base
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "tiny"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-tiny-link

  asr-small:
    <<: *asr-base
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "small"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-small-link

  asr-medium:
    <<: *asr-base
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "medium"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-medium-link

  asr-large:
    <<: *asr-base
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "large-v3"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-large-link

  # --- DEVELOPMENT SERVICES (Profile: dev) ---
  asr-tiny-dev:
    <<: *asr-base
    build:
      context: ./asr-service
    image: asr:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "tiny"
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
    volumes:
      - ./asr-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - asr-tiny-link

  asr-small-dev:
    <<: *asr-base
    build:
      context: ./asr-service
    image: asr:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "small"
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
    volumes:
      - ./asr-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - asr-small-link

  asr-medium-dev:
    <<: *asr-base
    build:
      context: ./asr-service
    image: asr:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "medium"
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
    volumes:
      - ./asr-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - asr-medium-link

  asr-large-dev:
    <<: *asr-base
    build:
      context: ./asr-service
    image: asr:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "large-v3"
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
    volumes:
      - ./asr-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - asr-large-link

  diarization:
    image: ghcr.io/chbister/diarization:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      DIARIZATION_MAX_ANALYZE_SEC: 120
      DIARIZATION_MIN_SPEAKER_SEC: 10
      DIARIZATION_MIN_SPEAKER_SHARE: 0.15
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - diarization-link

  diarization-image-builder:
    build:
      context: ./diarization-service
    image: ghcr.io/chbister/diarization:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service diarization-image-builder is only for building the image"]
    restart: "no"

  diarization-dev:
    build:
      context: ./diarization-service
    image: diarization:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
      DIARIZATION_MAX_ANALYZE_SEC: 120
      DIARIZATION_MIN_SPEAKER_SEC: 10
      DIARIZATION_MIN_SPEAKER_SHARE: 0.15
    volumes:
      - ./diarization-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - diarization-link

  gateway:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - asr-large
      - asr-medium
      - asr-small
      - asr-tiny
      - barcode
      - diarization
      - emotion
      - emotion-hate
      - emotion-nuance
      - emotion-state
      - emotion-vibe
      - metadata
      - ner
      - processor
      - sentiment
    profiles: [ "prod" ]
    networks:
      - edge
      - app

  gateway-dev:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - asr-large-dev
      - asr-medium-dev
      - asr-small-dev
      - asr-tiny-dev
      - barcode-dev
      - callback-tester-dev
      - diarization-dev
      - emotion-dev
      - emotion-hate-dev
      - emotion-nuance-dev
      - emotion-state-dev
      - emotion-vibe-dev
      - metadata-dev
      - ner-dev
      - processor-dev
      - sentiment-dev
    profiles: [ "dev" ]
    networks:
      - edge
      - app

  barcode:
    image: ghcr.io/chbister/barcode:latest
    expose:
      - "8000"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - barcode-link

  barcode-image-builder:
    build:
      context: ./barcode-service
    image: ghcr.io/chbister/barcode:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service barcode-image-builder is only for building the image"]
    restart: "no"

  barcode-dev:
    build:
      context: ./barcode-service
    image: barcode:local
    expose:
      - "8000"
    volumes:
      - ./barcode-service/app:/srv/app:rw
    environment:
      <<: *common-env
      UVICORN_RELOAD: "1"
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - barcode-link

  sentiment:
    image: ghcr.io/chbister/sentiment:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      SENTIMENT_MODEL_ID: "cardiffnlp/twitter-xlm-roberta-base-sentiment"
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - sentiment-link

  sentiment-image-builder:
    build:
      context: ./sentiment-service
    image: ghcr.io/chbister/sentiment:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service sentiment-image-builder is only for building the image"]
    restart: "no"

  sentiment-dev:
    build:
      context: ./sentiment-service
    image: sentiment:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      SENTIMENT_MODEL_ID: "cardiffnlp/twitter-xlm-roberta-base-sentiment"
      UVICORN_RELOAD: "1"
    volumes:
      - ./sentiment-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - sentiment-link

  ner:
    image: ghcr.io/chbister/ner:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      NER_MODEL_ID: "Davlan/xlm-roberta-large-ner-hrl"
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - ner-link

  ner-image-builder:
    build:
      context: ./ner-service
    image: ghcr.io/chbister/ner:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service ner-image-builder is only for building the image"]
    restart: "no"

  ner-dev:
    build:
      context: ./ner-service
    image: ner:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      NER_MODEL_ID: "Davlan/xlm-roberta-large-ner-hrl"
      UVICORN_RELOAD: "1"
    volumes:
      - ./ner-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - ner-link

  emotion:
    image: ghcr.io/chbister/emotion:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "lxyuan/distilbert-base-multilingual-cased-sentiments-student"
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-link

  emotion-image-builder:
    build:
      context: ./emotion-service
    image: ghcr.io/chbister/emotion:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service emotion-image-builder is only for building the image"]
    restart: "no"

  emotion-dev:
    image: emotion:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "lxyuan/distilbert-base-multilingual-cased-sentiments-student"
      UVICORN_RELOAD: "1"
    volumes:
      - ./emotion-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-link

  # --- EMOTION MODEL VARIANTS (Profile: prod) ---
  emotion-nuance:
    image: ghcr.io/chbister/emotion:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "SamLowe/roberta-base-go_emotions"
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-nuance-link

  emotion-vibe:
    image: ghcr.io/chbister/emotion:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "nlptown/bert-base-multilingual-uncased-sentiment" # Excellent for vibe/stars across languages
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-vibe-link

  emotion-state:
    image: ghcr.io/chbister/emotion:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "j-hartmann/emotion-english-distilroberta-base" # 7 core emotions
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-state-link

  # --- EMOTION MODEL VARIANTS (Profile: dev) ---
  emotion-nuance-dev:
    build:
      context: ./emotion-service
    image: emotion:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "SamLowe/roberta-base-go_emotions"
      UVICORN_RELOAD: "1"
    volumes:
      - ./emotion-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-nuance-link

  emotion-vibe-dev:
    build:
      context: ./emotion-service
    image: emotion:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "nlptown/bert-base-multilingual-uncased-sentiment"
      UVICORN_RELOAD: "1"
    volumes:
      - ./emotion-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-vibe-link

  emotion-state-dev:
    build:
      context: ./emotion-service
    image: emotion:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      #EMOTION_MODEL_ID: "j-hartmann/emotion-english-distilroberta-base"
      #EMOTION_MODEL_ID: "j-hartmann/emotion-multilingual-distilroberta-base"
      EMOTION_MODEL_ID: "ChrisLalk/German-Emotions"
      UVICORN_RELOAD: "1"
    volumes:
      - ./emotion-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-state-link

  emotion-hate:
    image: ghcr.io/chbister/emotion:latest
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "cardiffnlp/twitter-roberta-base-hate"
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-hate-link

  emotion-hate-dev:
    build:
      context: ./emotion-service
    image: emotion:local
    expose:
      - "8000"
    environment:
      <<: *common-env
      EMOTION_MODEL_ID: "cardiffnlp/twitter-roberta-base-hate"
      UVICORN_RELOAD: "1"
    volumes:
      - ./emotion-service/app:/srv/app:rw
      - hf_cache:/root/.cache
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - emotion-hate-link

  processor:
    image: ghcr.io/chbister/processor:latest
    expose:
      - "8000"
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - processor-link

  processor-image-builder:
    build:
      context: ./processor-service
    image: ghcr.io/chbister/processor:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service processor-image-builder is only for building the image"]
    restart: "no"

  processor-dev:
    build:
      context: ./processor-service
    image: processor:local
    expose:
      - "8000"
    volumes:
      - ./processor-service/app:/srv/app:rw
    environment:
      <<: *common-env
      UVICORN_RELOAD: "1"
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - processor-link

  callback-tester:
    image: ghcr.io/chbister/callback-tester:latest
    expose:
      - "8000"
    volumes:
      - callback_data:/srv/callbacks
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - callback-tester-link

  callback-tester-image-builder:
    build:
      context: ./callback-tester
    image: ghcr.io/chbister/callback-tester:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service callback-tester-image-builder is only for building the image"]
    restart: "no"

  callback-tester-dev:
    build:
      context: ./callback-tester
    image: callback-tester:local
    expose:
      - "8000"
    volumes:
      - ./callback-tester/app:/srv/app:rw
      - callback_data:/srv/callbacks
    environment:
      <<: *common-env
      UVICORN_RELOAD: "1"
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - callback-tester-link

  metadata:
    image: ghcr.io/chbister/metadata:latest
    environment:
      <<: *common-env
      MAX_DOWNLOAD_BYTES: 2097152000
      DOWNLOAD_TIMEOUT_S: 30
    restart: unless-stopped
    profiles: [ "prod" ]
    expose:
      - "8000"
    networks:
      edge:
      app:
        aliases:
          - metadata-link

  metadata-image-builder:
    build:
      context: ./metadata-service
    image: ghcr.io/chbister/metadata:latest
    profiles: [ "prod" ]
    entrypoint: ["echo", "Service metadata-image-builder is only for building the image"]
    restart: "no"

  metadata-dev:
    build:
      context: ./metadata-service
    image: metadata:local
    cap_add:
      - NET_ADMIN
    environment:
      <<: *common-env
      MAX_DOWNLOAD_BYTES: 2097152000
      DOWNLOAD_TIMEOUT_S: 30
      UVICORN_RELOAD: 1
    profiles: [ "dev" ]
    expose:
      - "8000"
    volumes:
      - ./metadata-service/app:/srv/app:rw
    networks:
      edge:
      app:
        aliases:
          - metadata-link

volumes:
  hf_cache:
  ct2_cache:
  asr_jobs:
  callback_data:
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK_NAME:-dev-shared-network}
  app: # internal-to-this-compose network (bridge)
    driver: bridge
