      - ./processor-service/app:/srv/app:rw
    environment:
      <<: *common-env
      UVICORN_RELOAD: "1"
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - processor-link

  callback-tester:
    image: ghcr.io/chbister/callback-tester:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.callback-tester.rule=Host(`ask.mybister.com`) && PathPrefix(`/callback-tester`)"
      - "traefik.http.routers.callback-tester.entrypoints=websecure"
      - "traefik.http.routers.callback-tester.tls=true"
      - "traefik.http.routers.callback-tester.tls.certresolver=letsencrypt"
      - "traefik.http.routers.callback-tester.middlewares=apikey-auth,callback-tester-strip"
      - "traefik.http.middlewares.callback-tester-strip.stripprefix.prefixes=/callback-tester"
      - "traefik.http.services.callback-tester.loadbalancer.server.port=8000"
    expose:
      - "8000"
    volumes:
      - callback_data:/srv/callbacks
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - callback-tester-link

  callback-tester-image-builder:
    build:
      context: ./callback-tester
    image: ghcr.io/chbister/callback-tester:latest
    profiles: [ "build" ]
    entrypoint: ["echo", "Service callback-tester-image-builder is only for building the image"]
    restart: "no"

  callback-tester-dev:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.callback-tester-dev.rule=PathPrefix(`/callback-tester`)"
      - "traefik.http.routers.callback-tester-dev.entrypoints=web"
      - "traefik.http.routers.callback-tester-dev.middlewares=callback-tester-strip"
      - "traefik.http.middlewares.callback-tester-strip.stripprefix.prefixes=/callback-tester"
      - "traefik.http.services.callback-tester-dev.loadbalancer.server.port=8000"
    build:
      context: ./callback-tester
    image: callback-tester:local
    expose:
      - "8000"
    volumes:
      - ./callback-tester/app:/srv/app:rw
      - callback_data:/srv/callbacks
    environment:
      <<: *common-env
      UVICORN_RELOAD: "1"
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - callback-tester-link

  metadata:
    image: ghcr.io/chbister/metadata:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.metadata.rule=Host(`ask.mybister.com`) && PathPrefix(`/metadata`)"
      - "traefik.http.routers.metadata.entrypoints=websecure"
      - "traefik.http.routers.metadata.tls=true"
      - "traefik.http.routers.metadata.tls.certresolver=letsencrypt"
      - "traefik.http.routers.metadata.middlewares=apikey-auth,metadata-strip"
      - "traefik.http.middlewares.metadata-strip.stripprefix.prefixes=/metadata"
      - "traefik.http.services.metadata.loadbalancer.server.port=8000"
    environment:
      <<: *common-env
      MAX_DOWNLOAD_BYTES: 2097152000
      DOWNLOAD_TIMEOUT_S: 30
    restart: unless-stopped
    profiles: [ "prod" ]
    expose:
      - "8000"
    networks:
      edge:
      app:
        aliases:
          - metadata-link

  metadata-image-builder:
    build:
      context: ./metadata-service
    image: ghcr.io/chbister/metadata:latest
    profiles: [ "build" ]
    entrypoint: ["echo", "Service metadata-image-builder is only for building the image"]
    restart: "no"

  metadata-dev:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.metadata-dev.rule=PathPrefix(`/metadata`)"
      - "traefik.http.routers.metadata-dev.entrypoints=web"
      - "traefik.http.routers.metadata-dev.middlewares=metadata-strip"
      - "traefik.http.middlewares.metadata-strip.stripprefix.prefixes=/metadata"
      - "traefik.http.services.metadata-dev.loadbalancer.server.port=8000"
    build:
      context: ./metadata-service
    image: metadata:local
    cap_add:
      - NET_ADMIN
    environment:
      <<: *common-env
      MAX_DOWNLOAD_BYTES: 2097152000
      DOWNLOAD_TIMEOUT_S: 30
      UVICORN_RELOAD: 1
    profiles: [ "dev" ]
    expose:
      - "8000"
    volumes:
      - ./metadata-service/app:/srv/app:rw
    networks:
      edge:
      app:
        aliases:
          - metadata-link


volumes:
  hf_cache:
  paddle_cache:
  ct2_cache:
  asr_jobs:
  ocr_jobs:
  callback_data:
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK_NAME:-dev-shared-network}
  app: # internal-to-this-compose network (bridge)
    driver: bridge
