      - "traefik.http.routers.diarization.tls=true"
      - "traefik.http.routers.diarization.tls.certresolver=letsencrypt"
      - "traefik.http.routers.diarization.middlewares=apikey-auth,diarization-strip"
      - "traefik.http.middlewares.diarization-strip.stripprefix.prefixes=/diarization"
      - "traefik.http.services.diarization.loadbalancer.server.port=8000"
