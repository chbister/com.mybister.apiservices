      - "traefik.http.middlewares.asr-medium-strip.stripprefix.prefixes=/asr-medium"
      - "traefik.http.services.asr-medium-dev.loadbalancer.server.port=8000"
    build:
      context: ./asr-service
    image: asr:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "medium"
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
    volumes:
