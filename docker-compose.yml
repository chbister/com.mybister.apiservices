    volumes:
      - ./asr-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - asr-large-link

  diarization:
    image: ghcr.io/chbister/diarization:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.diarization.rule=Host(`ask.mybister.com`) && PathPrefix(`/diarization`)"
