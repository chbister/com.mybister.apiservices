      - "traefik.http.routers.asr-small-dev.entrypoints=web"
      - "traefik.http.routers.asr-small-dev.middlewares=asr-small-strip"
      - "traefik.http.middlewares.asr-small-strip.stripprefix.prefixes=/asr-small"
