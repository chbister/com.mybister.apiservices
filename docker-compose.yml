x-common-env: &common-env
  HF_TOKEN: "${HF_TOKEN:-}"
  CALLBACK_AUTH_SECRET: "${CALLBACK_AUTH_SECRET:-}"
  REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

x-asr-env: &asr-env
  <<: *common-env
  ASR_COMPUTE_TYPE: "int8"
  ASR_DEFAULT_LANGUAGE: "auto"
  ASR_ASYNC_THRESHOLD: "300"
  ASR_JOBS_DIR: "/srv/jobs"
  UVICORN_HOST: "0.0.0.0"
  UVICORN_PORT: "8000"
  UVICORN_WORKERS: "2"
  OMP_NUM_THREADS: "1"
  CT2_NUM_THREADS: "1"

x-asr-base: &asr-base
  image: ghcr.io/chbister/asr:latest
  environment:
    <<: *asr-env
  volumes:
    - hf_cache:/root/.cache/huggingface
    - ct2_cache:/root/.cache/ctranslate2
    - asr_jobs:/srv/jobs

services:
  # --- PRODUCTION SERVICES (Profile: prod) ---
  apikey-auth:
    image: ghcr.io/chbister/com.mybister.forwardauthservice:latest
    environment:
      API_KEY: ${API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.apikey-auth.forwardauth.address=http://apikey-auth:8000/"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
    networks:
      - edge
  asr-image-builder:
    build:
      context: ./asr-service
    image: ghcr.io/chbister/asr:latest
    profiles: [ "build" ]
    entrypoint: ["echo", "Service asr-image-builder is only for building the image"]
    restart: "no"

  asr-tiny:
    <<: *asr-base
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.asr-tiny.rule=Host(`ask.mybister.com`) && PathPrefix(`/asr-tiny`)"
      - "traefik.http.routers.asr-tiny.entrypoints=websecure"
      - "traefik.http.routers.asr-tiny.tls=true"
      - "traefik.http.routers.asr-tiny.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asr-tiny.middlewares=apikey-auth,asr-tiny-strip"
      - "traefik.http.middlewares.asr-tiny-strip.stripprefix.prefixes=/asr-tiny"
      - "traefik.http.services.asr-tiny.loadbalancer.server.port=8000"
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "tiny"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-tiny-link

  asr-small:
    <<: *asr-base
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.asr-small.rule=Host(`ask.mybister.com`) && PathPrefix(`/asr-small`)"
      - "traefik.http.routers.asr-small.entrypoints=websecure"
      - "traefik.http.routers.asr-small.tls=true"
      - "traefik.http.routers.asr-small.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asr-small.middlewares=apikey-auth,asr-small-strip"
      - "traefik.http.middlewares.asr-small-strip.stripprefix.prefixes=/asr-small"
      - "traefik.http.services.asr-small.loadbalancer.server.port=8000"
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "small"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-small-link

  asr-medium:
    <<: *asr-base
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.asr-medium.rule=Host(`ask.mybister.com`) && PathPrefix(`/asr-medium`)"
      - "traefik.http.routers.asr-medium.entrypoints=websecure"
      - "traefik.http.routers.asr-medium.tls=true"
      - "traefik.http.routers.asr-medium.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asr-medium.middlewares=apikey-auth,asr-medium-strip"
      - "traefik.http.middlewares.asr-medium-strip.stripprefix.prefixes=/asr-medium"
      - "traefik.http.services.asr-medium.loadbalancer.server.port=8000"
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "medium"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-medium-link

  asr-large:
    <<: *asr-base
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.asr-large.rule=Host(`ask.mybister.com`) && PathPrefix(`/asr-large`)"
      - "traefik.http.routers.asr-large.entrypoints=websecure"
      - "traefik.http.routers.asr-large.tls=true"
      - "traefik.http.routers.asr-large.tls.certresolver=letsencrypt"
      - "traefik.http.routers.asr-large.middlewares=apikey-auth,asr-large-strip"
      - "traefik.http.middlewares.asr-large-strip.stripprefix.prefixes=/asr-large"
      - "traefik.http.services.asr-large.loadbalancer.server.port=8000"
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "large-v3"
      UVICORN_LOG_LEVEL: "info"
    restart: unless-stopped
    profiles: [ "prod" ]
    networks:
      edge:
      app:
        aliases:
          - asr-large-link

  # --- DEVELOPMENT SERVICES (Profile: dev) ---
  traefik-dev:
    image: traefik:latest
    container_name: traefik-dev
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "443:443"
      - "80:80"
      - "8080:8080" # Dashboard
    volumes:
      - "/Users/christianbister/.orbstack/run/docker.sock:/var/run/docker.sock:ro"
    profiles: [ "dev" ]
    restart: unless-stopped
    networks:
      - edge

  asr-tiny-dev:
    <<: *asr-base
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
      - "traefik.http.routers.asr-tiny-dev.rule=PathPrefix(`/asr-tiny`)"
      - "traefik.http.routers.asr-tiny-dev.entrypoints=web"
      - "traefik.http.routers.asr-tiny-dev.middlewares=asr-tiny-strip"
      - "traefik.http.middlewares.asr-tiny-strip.stripprefix.prefixes=/asr-tiny"
      - "traefik.http.services.asr-tiny-dev.loadbalancer.server.port=8000"
    build:
      context: ./asr-service
    image: asr:local
    expose:
      - "8000"
    environment:
      <<: *asr-env
      ASR_MODEL_SIZE: "tiny"
      UVICORN_RELOAD: "1"
      UVICORN_LOG_LEVEL: "debug"
    volumes:
      - ./asr-service/app:/srv/app:rw
      - hf_cache:/root/.cache/huggingface
      - ct2_cache:/root/.cache/ctranslate2
    profiles: [ "dev" ]
    networks:
      edge:
      app:
        aliases:
          - asr-tiny-link

  asr-small-dev:
    <<: *asr-base
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EDGE_NETWORK_NAME:-dev-shared-network}"
