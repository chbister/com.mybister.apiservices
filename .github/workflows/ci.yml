name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx qrcode pillow

      - name: Build services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile dev build

      - name: Start services
        run: |
          docker network create dev-shared-network || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile dev up -d
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run Integration Tests
        run: |
          pytest -vv -s tests/test_services.py
        env:
          TEST_BASE_URL: http://localhost:80
          SERVICE_STARTUP_TIMEOUT: 1200
          SERVICE_POLL_INTERVAL: 5
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile dev logs --timestamps

      - name: Cleanup
        if: always()
        run: |
          docker compose --profile dev down -v
          docker network rm dev-shared-network || true