name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx qrcode pillow

      - name: Build services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile dev build

      - name: Start services
        run: |
          docker network create dev-shared-network || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile dev up -d
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run Integration Tests
        run: |
          pytest -vv -s tests/test_services.py
        env:
          TEST_BASE_URL: http://localhost:80
          SERVICE_STARTUP_TIMEOUT: 1200
          SERVICE_POLL_INTERVAL: 5
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile dev logs --timestamps

      - name: Cleanup
        if: always()
        run: |
          docker compose --profile dev down -v
          docker network rm dev-shared-network || true

  build:
    name: "Build Production Images"
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Production Images
        run: |
          # Example build logic for production services
          # In a real scenario, this would iterate over services or use a script
          docker compose --profile prod build
          docker compose --profile prod push

  deploy:
    name: "Deploy to Production"
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deploying newly built images to production environment..."
          # Real deployment logic would go here, e.g., SSH to server and run docker compose pull/up
          # or use a deployment tool.
          echo "Successfully deployed."