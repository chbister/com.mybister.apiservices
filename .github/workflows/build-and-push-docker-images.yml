name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  parse-builds:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          json: true
          escape_json: false

      - name: Parse image-builder services from docker-compose.yml
        id: set-matrix
        shell: bash
        run: |
          # Use docker compose config to get the services and their contexts.
          # We'll then use jq to filter based on changed files.
          docker compose --profile prod config --format json > compose.json

          # Define the changed files as a JSON array.
          # For workflow_dispatch or if critical files changed, we might want to build everything.
          # tj-actions/changed-files output is already a JSON array.
          CHANGED_FILES='${{ steps.changed-files.outputs.all_changed_files }}'
          EVENT_NAME="${{ github.event_name }}"
          ROOT_DIR=$(pwd)
          
          # If it's workflow_dispatch, we treat all files as changed (effectively build all).
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            # We can leave CHANGED_FILES as empty to signal build all, or fill it with something.
            # But simpler logic: if it's workflow_dispatch, we skip filtering.
            echo "Workflow dispatch triggered - building all services."
            CHANGED_FILES="[]"
          fi

          matrix=$(
            jq -c --argjson changed_files "$CHANGED_FILES" --arg event "$EVENT_NAME" --arg root "$ROOT_DIR" '
              # Normalize contexts to be relative to project root
              # docker compose config --format json usually returns absolute paths.
              
              # First, check if any critical file changed (docker-compose.yml or this workflow)
              # If so, we might want to build all. 
              (
                ($event == "workflow_dispatch") or
                ($changed_files | any(. == "docker-compose.yml" or startswith(".github/workflows/")))
              ) as $build_all
              |
              {
                include: (
                  .services
                  | to_entries
                  | map(
                      select(.key | endswith("-image-builder"))
                      | {
                          service: .key,

                          # Resolve context to be relative to the project root
                          context:
                            (if (.value.build | type) == "string"
                             then .value.build
                             else .value.build.context
                             end),

                          dockerfile:
                            (if (.value.build | type) == "object" and .value.build.dockerfile != null
                             then .value.build.dockerfile
                             else "Dockerfile"
                             end),

                          target:
                            (if (.value.build | type) == "object" and .value.build.target != null
                             then .value.build.target
                             else ""
                             end),

                          image:
                            (.value.image // ""),

                          unique_key:
                            (
                              (if (.value.build | type) == "string"
                               then .value.build
                               else .value.build.context
                               end)
                              + "|"
                              + (if (.value.build | type) == "object" and .value.build.dockerfile != null
                                 then .value.build.dockerfile
                                 else "Dockerfile"
                                 end)
                              + "|"
                              + (if (.value.build | type) == "object" and .value.build.target != null
                                 then .value.build.target
                                 else ""
                                 end)
                            )
                        }
                    )
                  | unique_by(.unique_key)
                  | map(
                      . + {
                        # We need a relative version of the context for file matching
                        # Strip the root prefix from the absolute context path
                        rel_context: (.context | sub("^" + $root + "/"; "") | sub("^./"; "") | sub("/$"; "")),
                        
                        image_name:
                          (
                            if (.image | length) > 0
                            then
                              (
                                .image
                                | sub("^.*/"; "")
                                | sub(":[^:]+$"; "")
                              )
                            else .service
                            end
                          )
                      }
                    )
                  | map(
                      select(
                        $build_all or
                        (
                          .rel_context as $ctx
                          | $changed_files | any(startswith($ctx + "/"))
                        )
                      )
                    )
                )
              }
            ' compose.json
          )

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: parse-builds
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-builds.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: pushcheck
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.pushcheck.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: meta
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=$(echo "${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/${IMAGE}"

          TAGS="${IMAGE_NAME}:${{ github.sha }}"

          if [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi

          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: ${{ steps.pushcheck.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (with target)
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ steps.pushcheck.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
