name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GITHUB_OWNER: ${{ github.repository_owner }}

jobs:
  parse-builds:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse unique prod builds from docker-compose.yml
        id: set-matrix
        run: |
          docker compose --profile prod config --format json > compose.json

          matrix=$(
            jq -c '
              {
                include: (
                  .services
                  | to_entries
                  | map(
                      select(.value.build != null)
                      | {
                          service: .key,

                          context:
                            (if (.value.build | type) == "string"
                             then .value.build
                             else .value.build.context
                             end),

                          dockerfile:
                            (if (.value.build | type) == "object" and .value.build.dockerfile != null
                             then .value.build.dockerfile
                             else "Dockerfile"
                             end),

                          target:
                            (if (.value.build | type) == "object" and .value.build.target != null
                             then .value.build.target
                             else ""
                             end),

                          image:
                            (.value.image // ""),

                          unique_key:
                            (
                              (if (.value.build | type) == "string"
                               then .value.build
                               else .value.build.context
                               end)
                              + "|"
                              + (if (.value.build | type) == "object" and .value.build.dockerfile != null
                                 then .value.build.dockerfile
                                 else "Dockerfile"
                                 end)
                              + "|"
                              + (if (.value.build | type) == "object" and .value.build.target != null
                                 then .value.build.target
                                 else ""
                                 end)
                            )
                        }
                    )
                  | unique_by(.unique_key)
                  | map(
                      . + {
                        image_name:
                          (
                            if (.image | length) > 0
                            then
                              (
                                .image
                                | sub("^.*/"; "")
                                | sub(":[^:]+$"; "")
                              )
                            else .service
                            end
                          )
                      }
                    )
                )
              }
            ' compose.json
          )

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - name: Show build matrix
        run: echo '${{ steps.set-matrix.outputs.matrix }}' | jq .

  build-and-push:
    needs: parse-builds
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-builds.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/${{ matrix.image_name }}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            IMAGE_TAG="$IMAGE_NAME:latest"
          else
            SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/ ' '-')
            IMAGE_TAG="$IMAGE_NAME:$SAFE_REF"
          fi

          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tags=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          target: ${{ matrix.target != '' && matrix.target || null }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
