name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

env:
  REGISTRY: ghcr.io
  GITHUB_OWNER: ${{ github.repository_owner }}

jobs:
  parse-services:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse docker-compose.yml for services with prod profile
        id: set-matrix
        run: |
          # Extract services from docker-compose.yml using prod profile
          services=$(docker-compose --profile prod config --services 2>/dev/null || echo "asr-service asr-service-vibevoice barcode-service callback-tester diarization-service emotion-service gateway metadata-service processor-service sentiment-service")
          services_json=$(echo $services | tr ' ' '\n' | jq -R . | jq -s .)
          echo "matrix={\"service\":$(echo $services_json)}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: parse-services
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.parse-services.outputs.matrix) }}
      fail-fast: false
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/${{ matrix.service }}"
          IMAGE_TAG="${IMAGE_NAME}:latest"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            IMAGE_TAG="${IMAGE_NAME}:${{ github.ref_name }}"
          fi
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-with-compose:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images with docker-compose (prod profile)
        run: docker-compose --profile prod build

      - name: Push images with docker-compose (prod profile)
        run: |
          # Get all services from prod profile
          services=$(docker-compose --profile prod config --services)
          
          # Tag and push each image
          for service in $services; do
            # Get the image name from docker-compose config
            image=$(docker-compose --profile prod config --format json | jq -r ".services.$service.image // \"$service\"")
            
            if [ -z "$image" ] || [ "$image" == "null" ]; then
              image="$service"
            fi
            
            # Tag with GHCR registry
            ghcr_image="ghcr.io/${{ env.GITHUB_OWNER }}/$service:latest"
            docker tag "$image" "$ghcr_image"
            docker push "$ghcr_image"
          done
