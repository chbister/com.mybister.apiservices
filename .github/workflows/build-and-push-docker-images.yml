name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  parse-builds:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_builds: ${{ steps.set-matrix.outputs.has_builds }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          json: true
          escape_json: false

      - name: Parse image-builder services from docker-compose.yml
        id: set-matrix
        shell: bash
        run: |
          # Use docker compose config to get the services and their contexts.
          # We include all profiles that might contain build definitions.
          docker compose --profile build --profile builder config --format json > compose.json

          # Define the changed files as a JSON array.
          CHANGED_FILES='${{ steps.changed-files.outputs.all_changed_files }}'
          EVENT_NAME="${{ github.event_name }}"
          ROOT_DIR=$(pwd)
          
          echo "Detected changed files: $CHANGED_FILES"
          echo "Event name: $EVENT_NAME"

          matrix=$(
            jq -c --argjson changed_files "$CHANGED_FILES" --arg event "$EVENT_NAME" --arg root "$ROOT_DIR" '
              # Normalize contexts to be relative to project root
              
              # Check if any critical file changed (docker-compose.yml) or if it is a manual trigger
              (
                ($event == "workflow_dispatch") or
                ($changed_files | any(. == "docker-compose.yml"))
              ) as $build_all
              |
              # Define shared paths - changes here trigger rebuild of all dependent services
              ["libs", "packages", "shared", "common"] as $shared_paths
              |
              ($changed_files | any(. as $f | $shared_paths | any(. == ($f | split("/") | .[0])))) as $shared_changed
              |
              [ .services | to_entries[] 
                | select(.value.build != null)
                | .key as $name
                | (if (.value.build | type) == "string" then .value.build else .value.build.context end) as $ctx
                | ($ctx | sub("^" + $root + "/"; "") | sub("^./"; "") | sub("/$"; "")) as $rel_ctx
                | (if (.value.build | type) == "object" then .value.build.dockerfile // "Dockerfile" else "Dockerfile" end) as $df
                | (if (.value.build | type) == "object" then .value.build.target // "" else "" end) as $target
                | {
                    service: $name,
                    context: $ctx,
                    rel_context: $rel_ctx,
                    dockerfile: $df,
                    target: $target,
                    image: (.value.image // ""),
                    unique_key: ($ctx + "|" + $df + "|" + (if (.value.build | type) == "object" then .value.build.target // "" else "" end))
                  }
              ]
              | group_by(.unique_key)
              | map(
                  {
                    services: map(.service) | join(", "),
                    primary_service: .[0].service,
                    context: .[0].context,
                    rel_context: .[0].rel_context,
                    dockerfile: .[0].dockerfile,
                    target: .[0].target,
                    image: .[0].image,
                    image_name: (if (.[0].image | length) > 0 then (.[0].image | sub("^.*/"; "") | sub(":[^:]+$"; "")) else .[0].service end)
                  }
                )
              | map(
                  .rel_context as $ctx
                  | (
                      if $build_all then "Global trigger (event: " + $event + " or docker-compose.yml changed)"
                      elif $shared_changed then "Shared code directory changed"
                      elif ($changed_files | any(startswith($ctx + "/"))) then "Changes detected in service context: " + $ctx
                      else ""
                      end
                    ) as $reason
                  | select($reason != "")
                  | .reason = $reason
                )
              | { include: . }
            ' compose.json
          )

          echo "Selected services for build matrix:"
          echo "$matrix" | jq -r '.include[] | "- \(.primary_service) (services: \(.services)) because: \(.reason)"'

          has_builds=$(echo "$matrix" | jq -r '.include | length > 0')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_builds=$has_builds" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: parse-builds
    if: ${{ needs.parse-builds.outputs.has_builds == 'true' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-builds.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: pushcheck
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.pushcheck.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: meta
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=$(echo "${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/${IMAGE}"

          TAGS="${IMAGE_NAME}:${{ github.sha }}"

          if [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi

          echo "Building service(s): ${{ matrix.services }}"
          echo "Reason: ${{ matrix.reason }}"
          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: ${{ steps.pushcheck.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (with target)
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ steps.pushcheck.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
